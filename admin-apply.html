<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقديم رقابة - Realm City</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            cursor: none;
        }
        /* Preloader */
        #preloader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .loader { width: 50px; height: 50px; border: 3px solid rgba(0, 210, 255, 0.1); border-top-color: #00d2ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hexagon-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981, #059669);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .hexagon-logo i { font-size: 24px; color: white; }

        .navbar-top {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-item {
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0.8;
        }
        .nav-item:hover { opacity: 1; color: #10b981; }

        .form-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            margin-bottom: 25px;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        /* User Profile Style */
        .user-profile {
            display: none;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #10b981; }
        .logout-btn {
            cursor: pointer;
            color: #ef4444;
            font-size: 10px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .logout-btn:hover { opacity: 0.8; }
        .login-btn {
            background: #5865F2;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        /* Background Elements */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        .bg-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.01);
            z-index: -2;
            pointer-events: none;
            white-space: nowrap;
            user-select: none;
        }

        /* Feedback Status Overlay */
        .status-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(15px);
        }
        .status-overlay.active { display: flex; }
        .status-icon {
            width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 50px; margin-bottom: 20px; transform: scale(0); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .status-overlay.active .status-icon { transform: scale(1); }
        .status-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 2px solid #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 2px solid #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
        .status-text { font-size: 24px; font-weight: 900; color: white; text-align: center; max-width: 80%; }

        @media (max-width: 768px) {
            .navbar-top { padding: 15px 20px; }
            .form-container { padding: 30px 20px; }
        }

        /* Custom Cursor from index.html */
        .cursor { 
            position: fixed;
            width: 25px;
            height: 25px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out, border-color 0.3s, background 0.3s;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }
        
        .cursor-dot { 
            position: fixed;
            width: 6px;
            height: 6px;
            background: #00d2ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
            box-shadow: 0 0 10px #00d2ff;
        }

        .cursor-hover {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(0, 210, 255, 0.1);
            border-color: #fff;
        }

        /* Admin Store UI */
        .admin-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #00d2ff; color: black; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 11000; box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); transition: 0.3s; }
        .admin-btn:hover { transform: scale(1.1) rotate(15deg); }
        
        .admin-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 95%; max-width: 500px; background: #0a0a0a; border: 1px solid rgba(0, 210, 255, 0.5); border-radius: 30px; z-index: 11000; padding: 40px; display: none; opacity: 0; transition: all 0.4s ease; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        .admin-panel.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader"></div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor hidden md:block"></div>
    <div class="cursor-dot hidden md:block"></div>

    <!-- Admin Button -->
    <a id="adminBtn" href="admin.html" class="admin-btn">
        <i class="fas fa-cog"></i>
    </a>

    <!-- Feedback Overlay -->
    <div id="statusOverlay" class="status-overlay">
        <div id="statusIcon" class="status-icon"></div>
        <div id="statusText" class="status-text"></div>
    </div>

    <!-- Background Elements -->
    <div class="bg-glow"></div>
    <div class="bg-text">REALM</div>

    <nav class="navbar-top">
        <div class="flex gap-6 items-center">
            <a href="index.html" class="nav-item group">
                <i class="fas fa-arrow-right ml-2 group-hover:-translate-x-1 transition-transform"></i> العودة للرئيسية
            </a>
            <a id="adminApplyLink" href="admin-apply.html" class="nav-item" style="display: none;">تقديم رقابة</a>
            <a id="storeLink" href="store.html" class="nav-item">المتجر</a>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="loginSection">
                <button onclick="loginWithDiscord()" class="login-btn">
                    <i class="fab fa-discord"></i> تسجيل الدخول
                </button>
            </div>
            <div id="userSection" class="user-profile">
                <img id="userAvatar" class="user-avatar" src="" alt="">
                <div class="flex flex-col">
                    <span id="userName" class="text-xs font-bold"></span>
                    <span onclick="logout()" class="logout-btn">تسجيل الخروج</span>
                </div>
            </div>
            <div class="hexagon-logo">
                <i class="fas fa-shield-halved"></i>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        <div class="max-w-3xl mx-auto" data-aos="fade-up">
            <div class="form-container">
                <div class="text-center mb-12">
                    <h1 id="applyTitle" class="text-4xl font-black mb-4 text-emerald-500">تقديم طلب رقابة</h1>
                    <p class="text-gray-400">يرجى تعبئة كافة البيانات المطلوبة بدقة للتقديم على فريق الرقابة</p>
                </div>

                <form id="applyForm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400">الاسم الثلاثي</label>
                            <input type="text" id="fullName" class="form-input" placeholder="أدخل اسمك الكامل" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400">العمر</label>
                            <input type="number" id="age" class="form-input" placeholder="أدخل عمرك" required>
                        </div>
                    </div>
                    
                    <label class="block text-sm font-bold mb-2 text-gray-400">Discord ID</label>
                    <input type="text" id="discordId" class="form-input" placeholder="سيتم تعبئته تلقائياً عند تسجيل الدخول" required readonly>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400">الخبرة في الرقابة</label>
                            <select id="experience" class="form-input cursor-pointer" required>
                                <option value="" disabled selected>هل لديك خبرة سابقة؟</option>
                                <option value="none">لا توجد خبرة</option>
                                <option value="beginner">خبرة بسيطة</option>
                                <option value="intermediate">خبرة متوسطة</option>
                                <option value="expert">خبرة واسعة</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400">الساعات اليومية المتاحة</label>
                            <input type="number" id="hours" class="form-input" placeholder="مثلاً: 5" required>
                        </div>
                    </div>

                    <label class="block text-sm font-bold mb-2 text-gray-400">لماذا نختارك لتكون من فريق الرقابة؟</label>
                    <textarea id="reason" class="form-input h-40 resize-none" placeholder="اكتب مؤهلاتك وسبب رغبتك في الانضمام بالتفصيل" required></textarea>
                    
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-emerald-600/30 transform hover:scale-[1.02]">
                        إرسال الطلب الآن <i class="fas fa-paper-plane mr-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // --- STORAGE HELPERS (REPLACING SUPABASE) ---
        const getTable = (name) => JSON.parse(localStorage.getItem(`realm_${name}`) || '[]');
        const setTable = (name, data) => localStorage.setItem(`realm_${name}`, JSON.stringify(data));

        // Configuration
        const CLIENT_ID = '1458487352438554676';
        const REDIRECT_URI = window.location.href.split('#')[0].split('?')[0];
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1487153603192946748/KK2bnoUyNTMNJcHY1xexxhFt1rwJ99rbq8eJYwf5TMKGMbHrHjRVp45SnvLeqx6sI9Ic';
        const ADMIN_IDS = ['609296092835741696', '579499056536092672', '1026172587119755304', '1029823456386228356'];

        async function checkAdminAccess(user) {
            if (!user) return;
            console.log("Checking Admin Access for ID:", user.id);
            
            let isStaff = false;
            if (ADMIN_IDS.includes(user.id)) isStaff = true;
            else {
                const chefs = getTable('chefs');
                if (chefs.some(c => c.id === user.id)) isStaff = true;
            }

            if (isStaff) {
                console.log("Admin Access Granted!");
                document.getElementById('adminBtn').style.display = 'flex';
            } else {
                console.log("Admin Access Denied.");
                document.getElementById('adminBtn').style.display = 'none';
            }
        }

        // Discord Auth
        function loginWithDiscord() {
            if (window.location.protocol === 'file:') {
                alert("خطأ: يرجى تشغيل الموقع باستخدام خادم محلي (Live Server) لتسجيل الدخول.");
                return;
            }
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        function handleAuth() {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const accessToken = fragment.get('access_token');
            if (accessToken) {
                window.history.replaceState({}, document.title, window.location.pathname);
                fetchUserInfo(accessToken);
            } else {
                const storedUser = localStorage.getItem('discordUser');
                if (storedUser) {
                    updateUI(JSON.parse(storedUser));
                } else {
                    // Redirect or show login required
                    document.querySelector('.form-container').innerHTML = `
                        <div class="text-center py-20">
                            <i class="fab fa-discord text-blue-500 text-7xl mb-6"></i>
                            <h1 class="text-4xl font-black mb-4">يجب تسجيل الدخول</h1>
                            <p class="text-gray-400 mb-8">يجب عليك تسجيل الدخول عبر ديسكورد لتتمكن من التقديم.</p>
                            <button onclick="loginWithDiscord()" class="bg-[#5865F2] px-10 py-4 rounded-xl font-bold flex items-center gap-3 mx-auto hover:scale-105 transition-all">
                                <i class="fab fa-discord text-2xl"></i> تسجيل الدخول عبر ديسكورد
                            </button>
                        </div>
                    `;
                }
            }
        }

        async function fetchUserInfo(token) {
            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const user = await response.json();
                localStorage.setItem('discordUser', JSON.stringify(user));
                updateUI(user);
                window.location.reload(); // Reload to refresh the form view
            } catch (error) { console.error(error); }
        }

        function updateUI(user) {
            const loginSection = document.getElementById('loginSection');
            const userSection = document.getElementById('userSection');
            if(loginSection) loginSection.style.display = 'none';
            if(userSection) {
                userSection.style.display = 'flex';
                document.getElementById('userName').innerText = user.global_name || user.username;
                document.getElementById('userAvatar').src = user.avatar 
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';
            }
            const discordIdInput = document.getElementById('discordId');
            if(discordIdInput) discordIdInput.value = user.id;

            // Check Admin Access
            checkAdminAccess(user);

            // Show Admin Apply Link
            const adminApplyLink = document.getElementById('adminApplyLink');
            if (adminApplyLink) adminApplyLink.style.display = 'block';

            // Show Store Link
            const storeLink = document.getElementById('storeLink');
            if (storeLink) storeLink.classList.add('active');
        }

        function logout() {
            localStorage.removeItem('discordUser');
            window.location.reload();
        }

        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        let mouseX = 0, mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            requestAnimationFrame(() => {
                if (cursor) {
                    cursor.style.left = `${mouseX}px`;
                    cursor.style.top = `${mouseY}px`;
                }
                if (cursorDot) {
                    cursorDot.style.left = `${mouseX}px`;
                    cursorDot.style.top = `${mouseY}px`;
                }
            });
        });

        // Hover effects for cursor
        function initCursorHover() {
            const interactiveElements = document.querySelectorAll('a, button, input, select, textarea, .nav-item, .login-btn');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    if (cursor) cursor.classList.add('cursor-hover');
                });
                el.addEventListener('mouseleave', () => {
                    if (cursor) cursor.classList.remove('cursor-hover');
                });
            });
        }
        initCursorHover();

        // Form Submission
        document.getElementById('applyForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const discordUser = JSON.parse(localStorage.getItem('discordUser'));
            if (!discordUser) {
                alert('يرجى تسجيل الدخول عبر ديسكورد أولاً!');
                return;
            }

            const data = {
                fullName: document.getElementById('fullName').value,
                age: document.getElementById('age').value,
                discordId: document.getElementById('discordId').value,
                experience: document.getElementById('experience').value,
                hours: document.getElementById('hours').value,
                reason: document.getElementById('reason').value
            };

            const appCode = 'REALM-ADMIN-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            const embed = {
                title: `🛡️ طلب تقديم رقابة جديد`,
                color: 1061665, // Emerald green
                description: `قام **${data.fullName}** بإرسال طلب انضمام لفريق الرقابة.\n**كود الطلب:** \`${appCode}\``,
                fields: [
                    { name: '👤 الاسم الكامل', value: `\`${data.fullName}\``, inline: true },
                    { name: '🎂 العمر', value: `\`${data.age}\``, inline: true },
                    { name: '🆔 Discord ID', value: `\`${data.discordId}\``, inline: false },
                    { name: '🎓 الخبرة', value: `\`${data.experience}\``, inline: true },
                    { name: '⏰ الساعات اليومية', value: `\`${data.hours}\``, inline: true },
                    { name: '📝 السبب والمؤهلات', value: `\`\`\`${data.reason}\`\`\`` }
                ],
                footer: { text: `Realm City | ID: ${data.discordId}` },
                timestamp: new Date()
            };

            try {
                // Save to LocalStorage
                const apps = getTable('apps');
                apps.push({
                    fullName: data.fullName,
                    age: data.age,
                    discordId: data.discordId,
                    type: 'admin', // Staff Application
                    reason: `الخبرة: ${data.experience}\nالساعات: ${data.hours}\nالسبب: ${data.reason}`,
                    code: appCode,
                    created_at: new Date().toISOString()
                });
                setTable('apps', apps);

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        content: `📢 **طلب رقابة جديد** (كود: \`${appCode}\`)`,
                        embeds: [embed],
                        components: [
                            {
                                type: 1,
                                components: [
                                    {
                                        type: 2,
                                        style: 5,
                                        label: "👤 الملف الشخصي",
                                        url: `https://discord.com/users/${data.discordId}`
                                    }
                                ]
                            }
                        ]
                    })
                });

                if (response.ok) {
                    showFeedback(true, `تم التقديم بنجاح، انتظر الرد في الديسكورد.`);
                    document.getElementById('applyForm').reset();
                } else {
                    showFeedback(false, 'حدث خطأ أثناء الإرسال للديسكورد!');
                }
            } catch (error) {
                console.error("Submit Error:", error);
                showFeedback(false, 'فشل الإرسال: ' + error.message);
            }
        });

        function showFeedback(success, text) {
            const overlay = document.getElementById('statusOverlay');
            const icon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            icon.className = 'status-icon ' + (success ? 'status-success' : 'status-error');
            icon.innerHTML = success ? '<i class="fas fa-check"></i>' : '<i class="fas fa-times"></i>';
            statusText.innerText = text;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            setTimeout(() => {
                overlay.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 500);
                if(success) window.location.href = 'index.html';
            }, 4000);
        }

        // Initialize
        window.addEventListener('load', () => {
            // Preloader
            const hidePreloader = () => {
                const preloader = document.getElementById('preloader');
                if (preloader && preloader.style.display !== 'none') {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }
            };
            hidePreloader();
            setTimeout(hidePreloader, 3000);

            handleAuth();
            AOS.init({ duration: 800, once: true });

            // Unified Cursor JS
            const cursor = document.querySelector('.cursor');
            const cursorDot = document.querySelector('.cursor-dot');
            let mouseX = 0, mouseY = 0;
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                requestAnimationFrame(() => {
                    if (cursor) {
                        cursor.style.left = `${mouseX}px`;
                        cursor.style.top = `${mouseY}px`;
                    }
                    if (cursorDot) {
                        cursorDot.style.left = `${mouseX}px`;
                        cursorDot.style.top = `${mouseY}px`;
                    }
                });
            });
            
            function initCursorHover() {
                const interactiveElements = document.querySelectorAll('a, button, select, input, textarea');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        if (cursor) cursor.classList.add('cursor-hover');
                    });
                    el.addEventListener('mouseleave', () => {
                        if (cursor) cursor.classList.remove('cursor-hover');
                    });
                });
            }
            initCursorHover();
        });
    </script>
</body>
</html>
